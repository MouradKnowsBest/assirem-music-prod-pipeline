<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1920px; height: 1080px; overflow: hidden;
  background: #000;
  font-family: 'Inter', sans-serif;
}

#stage {
  position: relative; width: 1920px; height: 1080px; overflow: hidden;
}

/* ── Photo background (blurred fill only — lyrics are the content) */
.slide {
  position: absolute; inset: 0; opacity: 0;
  transition: opacity 2.5s ease; will-change: opacity;
  overflow: hidden;
}
.slide.active { opacity: 1; }
.slide::before {
  content: ""; position: absolute; inset: -10%;
  background-image: inherit;
  background-size: cover; background-position: center;
  filter: blur(50px) saturate(1.2) brightness(0.28);
}

/* ── Overlays */
#vignette {
  position: absolute; inset: 0; z-index: 2;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.65) 100%);
  pointer-events: none;
}
#gradient-bottom {
  position: absolute; bottom: 0; left: 0; right: 0; height: 300px; z-index: 2;
  background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
  pointer-events: none;
}
#gradient-top {
  position: absolute; top: 0; left: 0; right: 0; height: 160px; z-index: 2;
  background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
  pointer-events: none;
}

/* ── Brand (top left) */
#brand {
  position: absolute; top: 38px; left: 60px; z-index: 10;
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 300; letter-spacing: 0.22em;
  color: rgba(212,175,55,0.9);
  text-transform: uppercase;
}
#brand-sub {
  position: absolute; top: 73px; left: 61px; z-index: 10;
  font-size: 11px; letter-spacing: 0.38em; color: rgba(255,255,255,0.35);
  text-transform: uppercase;
}

/* ── ON AIR dot (top right) */
#on-air {
  position: absolute; top: 42px; right: 60px; z-index: 10;
  display: flex; align-items: center; gap: 9px;
  font-size: 11px; letter-spacing: 0.28em; color: rgba(255,80,80,0.85);
  text-transform: uppercase;
}
#on-air-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #ff4040;
  animation: blink 1.5s ease-in-out infinite;
}
@keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0.25; } }

/* ── Section label (above lyrics) */
#section-label {
  position: absolute; top: 180px; left: 0; right: 0; z-index: 10;
  text-align: center;
  font-size: 12px; letter-spacing: 0.5em; text-transform: uppercase;
  color: rgba(212,175,55,0.55);
  font-weight: 300;
  height: 18px;
  transition: opacity 0.6s, transform 0.6s;
}
#section-label.changing {
  opacity: 0; transform: translateY(-6px);
}

/* ── LYRICS TELEPROMPTER */
#lyrics-wrapper {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  width: 1500px;
  text-align: center;
  display: flex; flex-direction: column;
  align-items: center;
  gap: 0;
  margin-top: -20px;
}

.lyric-line {
  width: 100%;
  transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.3;
}

/* Distance slots */
.lyric-line.slot-far-past  {
  font-size: 20px; opacity: 0.08; color: #fff;
  padding: 6px 0;
  font-weight: 300;
}
.lyric-line.slot-past {
  font-size: 28px; opacity: 0.22; color: #fff;
  padding: 10px 0;
  font-weight: 300;
  letter-spacing: 0.02em;
}
.lyric-line.slot-active {
  font-size: 58px; opacity: 1;
  color: #ffffff;
  text-shadow: 0 0 80px rgba(212,175,55,0.55), 0 0 30px rgba(212,175,55,0.25), 0 3px 30px rgba(0,0,0,0.9);
  font-family: 'Cormorant Garamond', serif;
  font-weight: 500;
  letter-spacing: 0.025em;
  padding: 14px 0;
  font-style: italic;
}
.lyric-line.slot-next {
  font-size: 28px; opacity: 0.22; color: #fff;
  padding: 10px 0;
  font-weight: 300;
  letter-spacing: 0.02em;
}
.lyric-line.slot-far-next {
  font-size: 20px; opacity: 0.08; color: #fff;
  padding: 6px 0;
  font-weight: 300;
}
.lyric-line.slot-hidden {
  font-size: 20px; opacity: 0; color: #fff;
  padding: 6px 0;
  pointer-events: none;
  height: 0; padding: 0; overflow: hidden;
}

/* Section headers: different style when active */
.lyric-line.slot-active.is-section {
  font-size: 36px;
  color: rgba(212,175,55,0.85);
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 200;
  letter-spacing: 0.45em;
  text-transform: uppercase;
  text-shadow: 0 0 50px rgba(212,175,55,0.4);
}

/* ── Track info (bottom center) */
#track-info {
  position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
  z-index: 10; text-align: center;
  white-space: nowrap;
}
#track-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px; font-weight: 400;
  color: rgba(255,255,255,0.75); letter-spacing: 0.08em;
  margin-bottom: 5px;
}
#track-artist {
  font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase;
  color: rgba(212,175,55,0.65);
}

/* ── Progress bar */
#progress-bar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: rgba(255,255,255,0.08); z-index: 10;
}
#progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, rgba(212,175,55,0.5), rgba(212,175,55,1));
  transition: width 0.5s linear;
}

/* ── Time */
#time-display {
  position: absolute; bottom: 6px; right: 18px; z-index: 10;
  font-size: 11px; letter-spacing: 0.12em; color: rgba(255,255,255,0.25);
}

/* ── Film grain */
#grain {
  position: absolute; inset: 0; z-index: 30;
  width: 1920px; height: 1080px;
  pointer-events: none; opacity: 0.03;
  mix-blend-mode: screen;
}
</style>
</head>
<body>
<div id="stage">
  <div id="slides-container"></div>
  <div id="gradient-top"></div>
  <div id="gradient-bottom"></div>
  <div id="vignette"></div>

  <div id="brand">Assirem Music</div>
  <div id="brand-sub">Music PROD</div>
  <div id="on-air"><div id="on-air-dot"></div>ON AIR</div>

  <div id="section-label"></div>

  <div id="lyrics-wrapper">
    <div class="lyric-line slot-hidden" id="ll-fp"></div>
    <div class="lyric-line slot-hidden" id="ll-p"></div>
    <div class="lyric-line slot-hidden" id="ll-0"></div>
    <div class="lyric-line slot-hidden" id="ll-n"></div>
    <div class="lyric-line slot-hidden" id="ll-fn"></div>
  </div>

  <div id="track-info">
    <div id="track-title"></div>
    <div id="track-artist"></div>
  </div>

  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="time-display">0:00</div>

  <canvas id="grain"></canvas>
</div>

<script>
(function () {
  // ── Film grain ────────────────────────────────────────────────────────
  const canvas = document.getElementById('grain');
  const gctx   = canvas.getContext('2d');
  function drawGrain() {
    const id = gctx.createImageData(1920, 1080);
    const d  = id.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = Math.random() * 255 | 0;
      d[i] = d[i+1] = d[i+2] = v; d[i+3] = 255;
    }
    gctx.putImageData(id, 0, 0);
    requestAnimationFrame(drawGrain);
  }
  drawGrain();

  // ── State ─────────────────────────────────────────────────────────────
  let cfg        = null;
  let started    = false;
  let startTs    = null;
  let duration   = 0;
  let lyrics     = [];   // [{ time, text, isSection }]
  let lastIdx    = -1;
  let currentSlide = 0;

  // ── Slides ────────────────────────────────────────────────────────────
  function initSlides(photos, slideDurMs) {
    const container = document.getElementById('slides-container');
    photos.forEach(url => {
      const div = document.createElement('div');
      div.className = 'slide';
      div.style.backgroundImage = `url("${url}")`;
      container.appendChild(div);
    });
    activateSlide(0);
    if (photos.length > 1) {
      setInterval(() => {
        currentSlide = (currentSlide + 1) % photos.length;
        activateSlide(currentSlide);
      }, slideDurMs);
    }
  }
  function activateSlide(i) {
    currentSlide = i;
    document.querySelectorAll('.slide').forEach((s, j) =>
      s.classList.toggle('active', j === i)
    );
  }

  // ── Lyrics parsing ────────────────────────────────────────────────────
  function parseLyrics(raw, totalDuration) {
    if (!raw || !raw.trim()) return [];
    const SEPARATORS = /^(⸻+|---+|—+)$/;
    const SECTION    = /^\[.+\]$/;

    // Collect non-empty, non-separator lines
    const items = [];
    for (let l of raw.split('\n')) {
      l = l.trim();
      if (!l || SEPARATORS.test(l)) continue;
      items.push({ text: l, isSection: SECTION.test(l) });
    }
    if (!items.length) return [];

    // Weighted distribution: section headers get 0.4 units, content lines get 1
    const weight = items.reduce((s, it) => s + (it.isSection ? 0.4 : 1), 0);
    const tPerUnit = totalDuration / weight;

    let t = 0;
    return items.map(it => {
      const entry = { ...it, time: t };
      t += it.isSection ? tPerUnit * 0.4 : tPerUnit;
      return entry;
    });
  }

  // ── Lyrics display ────────────────────────────────────────────────────
  const slots = {
    '-2': { el: document.getElementById('ll-fp'), cls: 'slot-far-past'  },
    '-1': { el: document.getElementById('ll-p'),  cls: 'slot-past'      },
    '0':  { el: document.getElementById('ll-0'),  cls: 'slot-active'    },
    '1':  { el: document.getElementById('ll-n'),  cls: 'slot-next'      },
    '2':  { el: document.getElementById('ll-fn'), cls: 'slot-far-next'  },
  };

  let lastSection = '';

  function updateLyrics(elapsed) {
    if (!lyrics.length) return;

    // Current line index
    let idx = 0;
    for (let i = 0; i < lyrics.length; i++) {
      if (lyrics[i].time <= elapsed) idx = i;
      else break;
    }
    if (idx === lastIdx) return;
    lastIdx = idx;

    // Section label
    let section = '';
    for (let i = idx; i >= 0; i--) {
      if (lyrics[i].isSection) {
        section = lyrics[i].text.replace(/[\[\]]/g, '');
        break;
      }
    }
    if (section !== lastSection) {
      const el = document.getElementById('section-label');
      el.classList.add('changing');
      setTimeout(() => {
        el.textContent = section;
        el.classList.remove('changing');
      }, 300);
      lastSection = section;
    }

    // Render the 5-slot window
    for (const [offset, slot] of Object.entries(slots)) {
      const off  = parseInt(offset, 10);
      const line = lyrics[idx + off];

      if (!line) {
        slot.el.textContent = '';
        slot.el.className   = 'lyric-line slot-hidden';
        continue;
      }

      // Skip section headers in context slots (−2, −1, +1, +2)
      if (line.isSection && off !== 0) {
        slot.el.textContent = '';
        slot.el.className   = 'lyric-line slot-hidden';
        continue;
      }

      slot.el.textContent = line.text;
      let cls = `lyric-line ${slot.cls}`;
      if (off === 0 && line.isSection) cls += ' is-section';
      slot.el.className = cls;
    }
  }

  // ── Progress & time ───────────────────────────────────────────────────
  function updateProgress(elapsed) {
    const pct = Math.min(elapsed / duration * 100, 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    const s = Math.floor(elapsed);
    const m = Math.floor(s / 60);
    document.getElementById('time-display').textContent =
      `${m}:${String(s % 60).padStart(2, '0')} / ${Math.floor(duration/60)}:${String(Math.floor(duration)%60).padStart(2,'0')}`;
  }

  // ── Animation loop ────────────────────────────────────────────────────
  function tick(ts) {
    if (!startTs) startTs = ts;
    const elapsed = (ts - startTs) / 1000;
    updateLyrics(elapsed);
    updateProgress(elapsed);
    if (elapsed < duration + 2) {
      requestAnimationFrame(tick);
    } else {
      window.__assiremDone = true;
    }
  }

  // ── Public API ────────────────────────────────────────────────────────
  window.AssiremMontage = {
    configure(c) {
      cfg      = c;
      duration = c.duration || 240;
      lyrics   = parseLyrics(c.lyrics || '', duration);

      document.getElementById('track-title').textContent  = c.title  || '';
      document.getElementById('track-artist').textContent = c.artist || 'Assirem Music PROD';
      if (c.brand)    document.getElementById('brand').textContent     = c.brand;
      if (c.brandSub) document.getElementById('brand-sub').textContent = c.brandSub;

      const slideDurMs = c.slideDurMs ||
        Math.max(4000, Math.round(duration * 1000 / (c.photos || []).length));
      initSlides(c.photos || [], slideDurMs);
    },
    start() {
      if (started) return;
      started = true;
      requestAnimationFrame(tick);
    },
  };
})();
</script>
</body>
</html>
