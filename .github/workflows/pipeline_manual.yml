name: Assirem Pipeline (Manual — config locale)

# Workflow alternatif : lance le pipeline sur la config déjà dans le repo
# (config.json ou today/week_config.json), sans passer par le Drive.
# Utile pour lancer des tracks déjà configurés.

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug spécifique (vide = tous)'
        required: false
        default: ''
      skip_visual:
        description: 'Sauter Leonardo AI'
        type: boolean
        default: false
      skip_upload:
        description: 'Dry-run (pas d upload YouTube)'
        type: boolean
        default: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fontconfig
          fc-cache -f

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_ci.txt

      - name: Install Python deps
        run: pip install -r requirements_ci.txt

      - name: Reconstruct credentials
        env:
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
          YOUTUBE_OAUTH_PICKLE_B64: ${{ secrets.YOUTUBE_OAUTH_PICKLE_B64 }}
        run: python scripts/setup_credentials.py

      - name: Run pipeline
        env:
          SLUG: ${{ github.event.inputs.slug }}
          SKIP_VISUAL: ${{ github.event.inputs.skip_visual }}
          SKIP_UPLOAD: ${{ github.event.inputs.skip_upload }}
        run: |
          ARGS=""
          [ -n "$SLUG" ] && ARGS="$ARGS --slug $SLUG" || ARGS="$ARGS --all"
          [ "$SKIP_VISUAL" = "true" ] && ARGS="$ARGS --skip-visual"
          [ "$SKIP_UPLOAD" = "true" ] && ARGS="$ARGS --skip-upload"
          python pipeline.py $ARGS

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: |
            youtube_upload_tracker.json
            youtube_uploaded_videos.json
          retention-days: 30
          if-no-files-found: ignore
