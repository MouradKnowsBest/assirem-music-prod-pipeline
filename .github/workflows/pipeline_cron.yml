name: Assirem Pipeline (Drive Stock)

# Flux : tu déposes MP3 + image dans Drive → pipeline compile la vidéo → upload YouTube
# Pas besoin de Leonardo AI ni Claude : les assets sont fournis par toi.

on:
  schedule:
    # 4x/jour : 6h, 11h, 16h, 21h UTC
    - cron: '0 6,11,16,21 * * *'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug spécifique (vide = tous les tracks en stock)'
        required: false
        default: ''
      skip_upload:
        description: 'Dry-run (pas d upload YouTube)'
        type: boolean
        default: false

env:
  DRIVE_ROOT_FOLDER_ID: "1EwZA_ktS5_in8G3WrFgHm9a4yvqkPxx1"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6h max — Playwright screencast en temps réel (30 min track = 30 min attente)

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Système ─────────────────────────────────────────────────────────────
      - name: Install system deps (ffmpeg + fonts)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fontconfig
          fc-cache -f

      # ── Python ───────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_ci.txt

      - name: Install Python deps
        run: pip install -r requirements_ci.txt

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      # ── Credentials ──────────────────────────────────────────────────────────
      - name: Reconstruct credentials
        env:
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
          YOUTUBE_OAUTH_PICKLE_B64: ${{ secrets.YOUTUBE_OAUTH_PICKLE_B64 }}
        run: python scripts/setup_credentials.py

      # ── Drive : lister le stock ───────────────────────────────────────────────
      - name: List Drive stock
        env:
          DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SA_JSON }}
        run: python scripts/drive_stock.py list

      # ── Drive : télécharger les tracks ────────────────────────────────────────
      - name: Download tracks from Drive
        env:
          DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SA_JSON }}
        run: |
          SLUG="${{ github.event.inputs.slug }}"
          if [ -n "$SLUG" ]; then
            python scripts/drive_stock.py download ./stock --slug "$SLUG"
          else
            python scripts/drive_stock.py download ./stock
          fi

      # ── Vérifier qu'il y a quelque chose à traiter ───────────────────────────
      - name: Check stock not empty
        id: check_stock
        run: |
          if [ -d ./stock ] && [ "$(ls -A ./stock 2>/dev/null)" ]; then
            echo "has_tracks=true" >> $GITHUB_OUTPUT
            echo "  ✅ Stock non vide — on continue"
          else
            echo "has_tracks=false" >> $GITHUB_OUTPUT
            echo "  ℹ️  Stock vide (aucun fichier dans Drive incoming/) — rien à faire"
          fi

      # ── Auto-JSON : générer les JSONs manquants (template, sans IA) ──────────
      - name: Auto-generate missing JSONs
        if: steps.check_stock.outputs.has_tracks == 'true'
        run: python scripts/auto_json.py --batch ./stock

      # ── Préparer la config pipeline depuis le stock ───────────────────────────
      - name: Build pipeline config from stock
        if: steps.check_stock.outputs.has_tracks == 'true'
        run: python scripts/build_stock_config.py ./stock

      # ── Copier les MP3 vers input/ ────────────────────────────────────────────
      - name: Copy MP3s to input/
        if: steps.check_stock.outputs.has_tracks == 'true'
        run: |
          for slug_dir in stock/*/; do
            slug=$(basename "$slug_dir")
            mkdir -p "input/$slug"
            # Audio
            for f in "$slug_dir"*.mp3 "$slug_dir"*.wav "$slug_dir"*.m4a; do
              [ -f "$f" ] || continue
              cp "$f" "input/$slug/" && echo "  ✅ $f → input/$slug/"
            done
            # Images (thumbnail/cover)
            for f in "$slug_dir"*.jpg "$slug_dir"*.jpeg "$slug_dir"*.png "$slug_dir"*.webp; do
              [ -f "$f" ] || continue
              cp "$f" "input/$slug/" && echo "  🖼  $f → input/$slug/"
            done
          done

      # ── Pipeline ─────────────────────────────────────────────────────────────
      - name: Run pipeline
        if: steps.check_stock.outputs.has_tracks == 'true'
        env:
          SLUG: ${{ github.event.inputs.slug }}
          SKIP_UPLOAD: ${{ github.event.inputs.skip_upload }}
        run: |
          ARGS="--visual-engine template --config today/config.json"
          [ -n "$SLUG" ] && ARGS="$ARGS --slug $SLUG" || ARGS="$ARGS --all"
          [ "$SKIP_UPLOAD" = "true" ] && ARGS="$ARGS --skip-upload"
          echo "Running: python pipeline.py $ARGS"
          python pipeline.py $ARGS

      # ── Marquer les tracks traités ────────────────────────────────────────────
      - name: Mark successful tracks as done
        if: success() && steps.check_stock.outputs.has_tracks == 'true'
        env:
          DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SA_JSON }}
        run: |
          for slug_dir in stock/*/; do
            slug=$(basename "$slug_dir")
            echo "  → Marking $slug as done"
            python scripts/drive_stock.py mark-done "$slug" || echo "  ⚠️  Could not mark $slug (non-blocking)"
          done

      - name: Mark failed tracks
        if: failure() && steps.check_stock.outputs.has_tracks == 'true'
        env:
          DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SA_JSON }}
        run: |
          for slug_dir in stock/*/; do
            slug=$(basename "$slug_dir")
            python scripts/drive_stock.py mark-failed "$slug" || true
          done

      # ── Upload artifacts (logs) ───────────────────────────────────────────────
      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: |
            youtube_upload_tracker.json
            youtube_uploaded_videos.json
          retention-days: 30
          if-no-files-found: ignore
